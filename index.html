<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LEBAH SUGIH</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lebah Sugih">
    <meta name="theme-color" content="#0f2027">
    
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" sizes="192x192" href="icon-192.png">
    <link rel="icon" sizes="512x512" href="icon-512.png">

    <link rel="manifest" href="manifest.json">

    <script>
      // FIX BUG: Pendaftaran Service Worker yang aman untuk GitHub Pages
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('sw.js').then(function(registration) {
            console.log('PWA Mesin Aktif: ', registration.scope);
          }).catch(function(err) {
            console.log('PWA Gagal: ', err);
          });
        });
      }
    </script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
      * { box-sizing: border-box; } 
      body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: #ffffff; margin: 0; padding: 0; min-height: 100vh; padding-bottom: 90px; overflow-x: hidden; }
      .header { padding: 15px; text-align: center; position: sticky; top: 0; background: rgba(15, 32, 39, 0.9); backdrop-filter: blur(10px); z-index: 50; border-bottom: 1px solid rgba(255,255,255,0.1);}
      h2 { margin: 0; color: #00ff88; letter-spacing: 1px; font-weight: 800; font-size: 1.5em;}
      .container { padding: 15px; width: 100%; max-width: 600px; margin: 0 auto; }
      .tab-content { display: none; animation: fadeIn 0.3s; }
      .tab-content.active { display: block; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
      .header-card { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 10px;}
      .ticker { font-size: 1.3em; font-weight: 800; color: #fff; }
      .label { font-size: 0.7em; background: rgba(255, 255, 255, 0.1); padding: 5px 10px; border-radius: 20px; font-weight: 600; text-align: right;}
      .data-row { display: flex; justify-content: space-between; font-size: 0.9em; margin-bottom: 5px; color: #cbd5e1;}
      .net-profit { font-size: 1.4em; font-weight: 800; text-align: right; }
      .kas-box { background: linear-gradient(135deg, #1e293b, #0f172a); border: 1px solid rgba(0, 255, 136, 0.3); border-radius: 16px; padding: 20px; margin-bottom: 20px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.5);}
      .kas-title { font-size: 0.8em; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;}
      .kas-value { font-size: 2em; font-weight: 800; color: #00ff88; margin: 5px 0;}
      .btn-sync { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 8px 15px; border-radius: 20px; font-size: 0.8em; cursor: pointer; transition: 0.2s;}
      .status { margin-top: 15px; font-weight: 800; padding: 12px; border-radius: 8px; text-align: center; font-size: 0.9em;}
      .hijau { background: linear-gradient(90deg, #00b09b, #96c93d); color: #000;}
      .merah { background: linear-gradient(90deg, #cb2d3e, #ef473a); color: #fff;}
      .kuning { background: linear-gradient(90deg, #f7971e, #ffd200); color: #000; }
      .putih { background: rgba(255,255,255,0.1); color: #fff; }
      .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.1); z-index: 100; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
      .nav-item { color: #94a3b8; background: none; border: none; font-size: 1em; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; font-family: 'Inter'; padding: 5px 10px;}
      .nav-item.active { color: #00ff88; }
      .fab { position: fixed; bottom: 100px; right: 20px; background: #00ff88; color: #000; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; font-weight: bold; box-shadow: 0 4px 20px rgba(0,255,136,0.5); cursor: pointer; z-index: 90; border: none; }
      .input-group { margin-bottom: 15px; width: 100%;}
      .input-group label { display: block; font-size: 0.8em; color: #94a3b8; margin-bottom: 5px; font-weight: 600;}
      .input-group input, .input-group select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #fff; font-family: 'Inter'; font-size: 1em; }
      .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Inter'; font-size: 1em;}
      .btn-save { background: linear-gradient(90deg, #00ff88, #00b09b); color: #000; margin-top: 10px;}
      .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: flex-end; backdrop-filter: blur(5px); }
      .modal-content { background: #1e293b; padding: 25px; border-radius: 24px 24px 0 0; width: 100%; max-width: 600px; border-top: 1px solid rgba(255,255,255,0.1); animation: slideUp 0.3s; max-height: 90vh; overflow-y: auto; padding-bottom: calc(25px + env(safe-area-inset-bottom));}
      @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
      .close-btn { float: right; background: none; border: none; color: #ef4444; font-size: 1.5em; font-weight: bold; cursor: pointer; margin-top: -10px; margin-right: -10px; padding: 10px;}
      .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #00ff88; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 50px auto; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="header">
      <div style="display:flex; justify-content:center; align-items:center; gap:10px;">
        <img src="logo.png" alt="Logo" style="height:32px; width:auto; border-radius:4px;">
        <h2>LEBAH SUGIH</h2>
      </div>
    </div>

    <div id="tab-porto" class="container tab-content active">
      <div class="kas-box">
        <div class="kas-title">Saldo Tersedia (Buying Power)</div>
        <div class="kas-value" id="disp-kas">Rp 0</div>
        <div style="font-size:0.8em; color:#cbd5e1; margin-bottom:15px;">Total Portofolio: <b id="disp-porto">Rp 0</b></div>
        <button class="btn-sync" onclick="bukaModalSync()">🔄 SINKRONISASI SALDO</button>
      </div>
      <div id="app-porto"><div class="loader"></div></div>
      <button class="fab" onclick="bukaModalAset()">+</button>
    </div>

    <div id="tab-deal" class="container tab-content">
      <div class="card">
        <h3 style="margin-top:0; color:#00ff88;">🤝 Cek Deal Aset Fisik</h3>
        <p style="font-size:0.8em; color:#94a3b8;">Sistem menghitung Margin of Safety otomatis.</p>
        <form id="formDeal" onsubmit="hitungDeal(event)">
          <div class="input-group"><label>Nama Barang</label><input type="text" id="dealNama" required placeholder="Misal: MacBook Pro M2"></div>
          <div class="input-group"><label>Harga Pasar Normal (Rp)</label><input type="text" inputmode="decimal" id="dealPasar" oninput="formatRupiah(this)" required></div>
          <div class="input-group"><label>Harga Tawaran (Rp)</label><input type="text" inputmode="decimal" id="dealTawaran" oninput="formatRupiah(this)" required></div>
          <div class="input-group"><label>Estimasi Biaya Servis (Rp)</label><input type="text" inputmode="decimal" id="dealServis" oninput="formatRupiah(this)" required></div>
          <button type="submit" class="btn btn-save" id="btnDeal">Cek Kelayakan</button>
        </form>
        <div id="hasilDeal" style="display: none; margin-top: 20px; border-top: 1px dashed #334155; padding-top: 20px;">
          <div style="text-align:center; font-size:0.9em; color:#94a3b8;">Margin of Safety:</div>
          <div style="font-size: 2.5em; font-weight: 800; text-align: center; margin: 10px 0;" id="angkaMoS">0%</div>
          <div class="status" id="statusDeal"></div>
        </div>
      </div>
    </div>

    <div class="bottom-nav">
      <button class="nav-item active" id="nav-porto" onclick="pindahTab('porto')"><span style="font-size:1.5em;">📊</span> Portofolio</button>
      <button class="nav-item" id="nav-deal" onclick="pindahTab('deal')"><span style="font-size:1.5em;">🤝</span> Cek Deal</button>
    </div>

    <div class="modal" id="modalSync">
      <div class="modal-content">
        <button class="close-btn" onclick="document.getElementById('modalSync').style.display='none'">✕</button>
        <h3 style="margin-top:0; color:#00ff88; margin-bottom: 10px;">Sinkronisasi Saldo</h3>
        <p style="font-size:0.8em; color:#94a3b8; margin-top:-5px;">Masukkan Saldo Asli Broker.</p>
        <form id="formSync" onsubmit="eksekusiSync(event)">
          <div class="input-group"><input type="text" inputmode="decimal" id="saldoBaru" oninput="formatRupiah(this)" required placeholder="Misal: 10.500.000"></div>
          <button type="submit" class="btn btn-save" id="btnSync">Perbarui Saldo</button>
        </form>
      </div>
    </div>

    <div class="modal" id="modalAset">
      <div class="modal-content">
        <button class="close-btn" onclick="document.getElementById('modalAset').style.display='none'">✕</button>
        <h3 style="margin-top:0; color:#fff; margin-bottom: 20px;">Tambah Aset Baru</h3>
        <form id="formAset" onsubmit="simpanAset(event)">
          <div style="display:flex; gap:10px;">
            <div class="input-group" style="flex:2;"><label>Ticker (Kode)</label><input type="text" id="ticker" required placeholder="ANTAM / BBCA"></div>
            <div class="input-group" style="flex:1;">
              <label>Kategori</label>
              <select id="kategori">
                <option value="Saham">Saham</option>
                <option value="Crypto">Crypto</option>
                <option value="Emas">Emas</option>
              </select>
            </div>
          </div>
          <div class="input-group">
            <label>Screener Strategy</label>
            <select id="strategi"><option value="Paus Bergerak">🔥 Paus Bergerak</option><option value="Buffettology">💎 Buffettology</option><option value="Input Manual">⚡ Manual</option></select>
          </div>
          <div style="display:flex; gap:10px;">
            <div class="input-group" style="flex:1;"><label>Avg Price / Gram</label><input type="text" inputmode="decimal" id="hargaBeli" oninput="formatRupiah(this)" required></div>
            <div class="input-group" style="flex:1;"><label>Kuantitas (Gram/Lot)</label><input type="text" inputmode="decimal" id="kuantitas" oninput="formatRupiah(this)" required></div>
          </div>
          <div style="display:flex; gap:10px;">
            <div class="input-group" style="flex:1;"><label>Target TP (%)</label><input type="number" id="tp" step="any" required></div>
            <div class="input-group" style="flex:1;"><label>Batas SL (%)</label><input type="number" id="sl" step="any" required></div>
          </div>
          <button type="submit" class="btn btn-save" id="btnSimpanAset">Simpan ke Radar</button>
        </form>
      </div>
    </div>

    <div class="modal" id="modalJual">
      <div class="modal-content">
        <button class="close-btn" onclick="document.getElementById('modalJual').style.display='none'">✕</button>
        <h3 style="margin-top:0; color:#ef4444; margin-bottom: 20px;">Rebalance</h3>
        <form id="formJual" onsubmit="eksekusiJual(event)">
          <input type="hidden" id="jualTicker">
          <div class="input-group"><label>Aset</label><input type="text" id="jualTickerLabel" readonly disabled style="background:#0f2027; color:#00ff88; text-align:center;"></div>
          <div style="display:flex; gap:10px;">
            <div class="input-group" style="flex:1;"><label>Harga Jual</label><input type="text" inputmode="decimal" id="jualHarga" oninput="formatRupiah(this)" required></div>
            <div class="input-group" style="flex:1;"><label>Qty Dijual</label><input type="text" inputmode="decimal" id="jualKuantitas" oninput="formatRupiah(this)" required></div>
          </div>
          <button type="submit" class="btn" id="btnEksekusiJual" style="background: linear-gradient(90deg, #ef4444, #b91c1c); color:#fff; margin-top:10px;">Eksekusi & Tarik ke Kas</button>
        </form>
      </div>
    </div>

    <script>
      const API_URL = "https://script.google.com/macros/s/AKfycbxijpW-XhGgenW9dTJE4LwK48MYbPp_kyRJs4jgPzdfdHx2hIYpgePS26zkXzkP_YKk/exec";

      function formatRupiah(obj) {
        let val = obj.value.replace(/[^0-9.,]/g, ''); let parts = val.split(',');
        let intPart = parts[0].replace(/\./g, ''); intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        obj.value = (parts.length > 1) ? intPart + ',' + parts[1] : intPart;
      }
      function bersihkanAngka(str) { return parseFloat(str.replace(/\./g, '').replace(',', '.')); }
      function formatDisplay(num) { return new Intl.NumberFormat('id-ID').format(num); }

      function pindahTab(tab) {
        document.getElementById('tab-porto').classList.remove('active'); document.getElementById('tab-deal').classList.remove('active');
        document.getElementById('nav-porto').classList.remove('active'); document.getElementById('nav-deal').classList.remove('active');
        document.getElementById('tab-' + tab).classList.add('active'); document.getElementById('nav-' + tab).classList.add('active');
      }

      var asetTersedia = {}; 
      function renderPorto(resp) {
        if(resp.status === "error") { document.getElementById('app-porto').innerHTML = '<p class="merah">Gagal: '+resp.msg+'</p>'; return; }
        document.getElementById('disp-kas').innerText = 'Rp ' + formatDisplay(resp.saldoKas);
        document.getElementById('disp-porto').innerText = 'Rp ' + formatDisplay(resp.totalPorto);
        var app = document.getElementById('app-porto'); app.innerHTML = ''; asetTersedia = {};

        if (!resp.aset || resp.aset.length === 0) { app.innerHTML = '<p style="text-align:center; color:#94a3b8;">Belum ada aset yang dipantau.</p>'; return; }

        resp.aset.forEach(function(item) {
          asetTersedia[item.ticker] = item; 
          var bgColor = "putih";
          if (item.status.includes("🟢")) bgColor = "hijau"; else if (item.status.includes("🔴")) bgColor = "merah"; else if (item.status.includes("🟡")) bgColor = "kuning";
          var profitColor = item.status.includes("MINUS") || item.status.includes("CUT LOSS") ? "#ef4444" : "#00ff88";

          var card = `<div class="card"><div class="header-card"><div class="ticker">${item.ticker}</div><div class="label">${item.label}</div></div><div class="data-row"><span>Kategori</span><span style="font-weight:600; color:#94a3b8;">${item.kategori}</span></div><div class="data-row"><span>Avg Price</span><span style="font-weight:600; color:#fff;">${formatDisplay(item.hargaBeli)}</span></div><div class="data-row"><span>Live Price</span><span style="font-weight:600; color:#fff;">${formatDisplay(item.hargaLive)}</span></div><div class="data-row"><span>Qty</span><span style="font-weight:600; color:#94a3b8;">${formatDisplay(item.kuantitas)}</span></div><div class="data-row" style="margin-top:10px; align-items:center;"><span>Net Profit</span><span class="net-profit" style="color:${profitColor};">${item.netProfit}</span></div><div class="status ${bgColor}">${item.status}</div><button onclick="bukaModalJual('${item.ticker}')" style="width:100%; margin-top:15px; padding:12px; background:rgba(239, 68, 68, 0.1); color:#ef4444; border:1px solid rgba(239, 68, 68, 0.3); border-radius:8px; font-weight:bold; cursor:pointer;">⚖️ Rebalance / Jual</button></div>`;
          app.innerHTML += card;
        });
      }

      function muatDataPorto() {
        document.getElementById('app-porto').innerHTML = '<div class="loader"></div>';
        fetch(API_URL + "?action=getData").then(res => res.json()).then(data => renderPorto(data)).catch(err => { document.getElementById('app-porto').innerHTML = '<p class="merah">Gagal terhubung ke Server.</p>'; });
      }

      function panggilAPI(action, payload, callback) {
        fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: action, payload: payload }) })
        .then(res => res.json()).then(data => callback(data.result)).catch(err => alert("Gagal koneksi ke Server."));
      }

      function bukaModalAset() { document.getElementById('modalAset').style.display = 'flex'; }
      function bukaModalSync() { document.getElementById('modalSync').style.display = 'flex'; }
      function eksekusiSync(e) { e.preventDefault(); var btn = document.getElementById('btnSync'); btn.innerHTML = "Memperbarui..."; btn.disabled = true; var nom = bersihkanAngka(document.getElementById('saldoBaru').value); panggilAPI('sinkronisasiSaldo', nom, function(res) { document.getElementById('modalSync').style.display = 'none'; document.getElementById('formSync').reset(); btn.innerHTML = "Perbarui Saldo"; btn.disabled = false; muatDataPorto(); }); }
      function simpanAset(e) { e.preventDefault(); var btn = document.getElementById('btnSimpanAset'); btn.innerHTML = "Menyimpan..."; btn.disabled = true; var data = { ticker: document.getElementById('ticker').value, kategori: document.getElementById('kategori').value, sourceStrategy: document.getElementById('strategi').value, hargaBeli: bersihkanAngka(document.getElementById('hargaBeli').value), kuantitas: bersihkanAngka(document.getElementById('kuantitas').value), tp: document.getElementById('tp').value, sl: document.getElementById('sl').value }; panggilAPI('tambahAsetBaru', data, function(res) { document.getElementById('modalAset').style.display = 'none'; document.getElementById('formAset').reset(); btn.innerHTML = "Simpan ke Radar"; btn.disabled = false; muatDataPorto(); }); }
      function hitungDeal(e) { e.preventDefault(); var btn = document.getElementById('btnDeal'); btn.innerHTML = "Menganalisis..."; btn.disabled = true; var data = { namaBarang: document.getElementById('dealNama').value, hargaPasar: bersihkanAngka(document.getElementById('dealPasar').value), hargaTawaran: bersihkanAngka(document.getElementById('dealTawaran').value), biayaServis: bersihkanAngka(document.getElementById('dealServis').value) }; panggilAPI('tambahDealEvaluator', data, function(res) { btn.innerHTML = "Cek Kelayakan"; btn.disabled = false; var el = document.getElementById('hasilDeal'); el.style.display = 'block'; document.getElementById('angkaMoS').innerHTML = res.mos; document.getElementById('statusDeal').innerHTML = res.keputusan; if(res.keputusan.includes("AMAN")) { document.getElementById('statusDeal').className = "status hijau"; document.getElementById('angkaMoS').style.color = "#00ff88"; } else { document.getElementById('statusDeal').className = "status merah"; document.getElementById('angkaMoS').style.color = "#ef4444"; } document.getElementById('formDeal').reset(); }); }
      function bukaModalJual(ticker) { var aset = asetTersedia[ticker]; document.getElementById('jualTicker').value = ticker; document.getElementById('jualTickerLabel').value = ticker + " (Qty: " + aset.kuantitas + ")"; var inp = document.getElementById('jualHarga'); inp.value = aset.hargaLive; formatRupiah(inp); document.getElementById('jualKuantitas').placeholder = "Maksimal: " + aset.kuantitas; document.getElementById('modalJual').style.display = 'flex'; }
      function eksekusiJual(e) { e.preventDefault(); var btn = document.getElementById('btnEksekusiJual'); btn.innerHTML = "Mengeksekusi..."; btn.disabled = true; var data = { ticker: document.getElementById('jualTicker').value, hargaJual: bersihkanAngka(document.getElementById('jualHarga').value), kuantitasJual: bersihkanAngka(document.getElementById('jualKuantitas').value) }; panggilAPI('eksekusiJualDinamis', data, function(res) { document.getElementById('modalJual').style.display = 'none'; document.getElementById('formJual').reset(); btn.innerHTML = "Eksekusi & Tarik ke Kas"; btn.disabled = false; if(res === "BERHASIL") muatDataPorto(); else { alert(res); muatDataPorto(); } }); }
      
      muatDataPorto();
    </script>
  </body>
</html>
